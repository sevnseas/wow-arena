<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WoW Arena Sandbox</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      background: #1a1a2e;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    canvas {
      display: block;
    }

    /* Target Pane */
    #target-pane {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      border: 2px solid #444;
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      font-size: 14px;
      min-width: 180px;
      z-index: 100;
    }
    #target-pane .label {
      color: #888;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    #target-pane .name {
      font-size: 18px;
      font-weight: bold;
    }
    #target-pane .info {
      margin-top: 8px;
      font-size: 12px;
      color: #aaa;
    }
    #target-debuffs {
      margin-top: 8px;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .debuff-icon {
      background: #660066;
      border: 1px solid #990099;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 10px;
      color: #fff;
    }

    /* Action Bar */
    #action-bar {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(3, 50px);
      gap: 4px;
      z-index: 100;
    }
    .action-slot {
      width: 50px;
      height: 50px;
      background: rgba(0, 0, 0, 0.8);
      border: 2px solid #555;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      transition: border-color 0.1s;
    }
    .action-slot:hover {
      border-color: #888;
    }
    .action-slot.pressed {
      background: rgba(255, 255, 255, 0.2);
      border-color: #fff;
    }
    .action-slot.on-cooldown {
      opacity: 0.5;
    }
    .action-slot .keybind {
      position: absolute;
      top: 2px;
      left: 4px;
      font-size: 10px;
      color: #ff0;
      font-weight: bold;
    }
    .action-slot .ability-name {
      font-size: 9px;
      color: #ccc;
      text-align: center;
      margin-top: 12px;
    }
    .action-slot .cooldown-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #fff;
      font-weight: bold;
      border-radius: 4px;
    }

    /* Cast Bar */
    #cast-bar {
      position: fixed;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 24px;
      background: rgba(0, 0, 0, 0.8);
      border: 2px solid #555;
      border-radius: 4px;
      display: none;
      z-index: 100;
    }
    #cast-bar.active {
      display: block;
    }
    #cast-bar-fill {
      height: 100%;
      background: linear-gradient(to right, #4488ff, #88ccff);
      border-radius: 2px;
      transition: width 0.05s linear;
    }
    #cast-bar-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #fff;
      text-shadow: 1px 1px 2px #000;
    }

    /* Class Selector */
    #class-selector {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.95);
      border: 2px solid #666;
      border-radius: 12px;
      padding: 20px 30px;
      display: none;
      z-index: 200;
    }
    #class-selector.active {
      display: block;
    }
    #class-selector h2 {
      color: #fff;
      margin-bottom: 16px;
      text-align: center;
      font-size: 18px;
    }
    .class-buttons {
      display: flex;
      gap: 12px;
    }
    .class-btn {
      padding: 12px 24px;
      border: 2px solid #555;
      border-radius: 8px;
      background: rgba(50, 50, 50, 0.8);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .class-btn:hover {
      border-color: #888;
      background: rgba(80, 80, 80, 0.8);
    }
    .class-btn.selected {
      border-color: #ffcc00;
      background: rgba(100, 80, 0, 0.8);
    }
    .class-btn.rogue { border-color: #ff0; }
    .class-btn.mage { border-color: #69ccf0; }
    .class-btn.priest { border-color: #fff; }

    /* Current Class Display */
    #current-class {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.8);
      border: 2px solid #444;
      border-radius: 8px;
      padding: 8px 16px;
      color: #fff;
      font-size: 14px;
      z-index: 100;
    }

    /* Debug & Help */
    #debug-info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 4px;
      padding: 8px 12px;
      color: #0f0;
      font-family: monospace;
      font-size: 12px;
      z-index: 100;
    }
    #controls-help {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 4px;
      padding: 8px 12px;
      color: #ccc;
      font-family: monospace;
      font-size: 11px;
      z-index: 100;
      text-align: right;
    }
  </style>
  <script type="module" crossorigin src="/threejs-arena/assets/index-DW6WPkhj.js"></script>
</head>
<body>
  <!-- Target Pane -->
  <div id="target-pane">
    <div class="label">Target</div>
    <div class="name" id="target-name">No Target</div>
    <div class="info" id="target-info"></div>
    <div id="target-debuffs"></div>
  </div>

  <!-- Current Class -->
  <div id="current-class">Class: <span id="class-name">Rogue</span></div>

  <!-- Class Selector (Tab to toggle) -->
  <div id="class-selector">
    <h2>Select Class</h2>
    <div class="class-buttons">
      <button class="class-btn rogue" data-class="Rogue">Rogue</button>
      <button class="class-btn mage" data-class="Mage">Mage</button>
      <button class="class-btn priest" data-class="Priest">Priest</button>
    </div>
  </div>

  <!-- Cast Bar -->
  <div id="cast-bar">
    <div id="cast-bar-fill" style="width: 0%"></div>
    <div id="cast-bar-text">Casting...</div>
  </div>

  <!-- Action Bar (3x3 grid, only using 8 slots) -->
  <div id="action-bar">
    <div class="action-slot" data-key="1"><span class="keybind">1</span><span class="ability-name"></span></div>
    <div class="action-slot" data-key="2"><span class="keybind">2</span><span class="ability-name"></span></div>
    <div class="action-slot" data-key="3"><span class="keybind">3</span><span class="ability-name"></span></div>
    <div class="action-slot" data-key="q"><span class="keybind">Q</span><span class="ability-name"></span></div>
    <div class="action-slot" data-key="e"><span class="keybind">E</span><span class="ability-name"></span></div>
    <div class="action-slot" data-key="r"><span class="keybind">R</span><span class="ability-name"></span></div>
    <div class="action-slot" data-key="f"><span class="keybind">F</span><span class="ability-name"></span></div>
    <div class="action-slot" data-key="g"><span class="keybind">G</span><span class="ability-name"></span></div>
    <div class="action-slot" data-key="" style="visibility: hidden;"><span class="keybind"></span><span class="ability-name"></span></div>
  </div>

  <!-- Debug & Help -->
  <div id="debug-info"></div>
  <div id="controls-help">
    WASD: Move | Space: Jump | Tab: Class Select<br>
    1-3, Q-R, F-G: Abilities | Click: Target
  </div>

</body>
</html>
