<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WoW Arena Sandbox</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      background: #1a1a2e;
    }
    canvas {
      display: block;
    }
    #target-pane {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      border: 2px solid #444;
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      min-width: 180px;
      z-index: 100;
    }
    #target-pane .label {
      color: #888;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    #target-pane .name {
      font-size: 18px;
      font-weight: bold;
    }
    #target-pane .info {
      margin-top: 8px;
      font-size: 12px;
      color: #aaa;
    }
    #debug-info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 4px;
      padding: 8px 12px;
      color: #0f0;
      font-family: monospace;
      font-size: 12px;
      z-index: 100;
    }
    #controls-help {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 4px;
      padding: 8px 12px;
      color: #ccc;
      font-family: monospace;
      font-size: 11px;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="target-pane">
    <div class="label">Target</div>
    <div class="name" id="target-name">No Target</div>
    <div class="info" id="target-info"></div>
  </div>
  <div id="debug-info"></div>
  <div id="controls-help">
    WASD: Move | Space: Jump | Left-click drag: Orbit camera | Click unit: Target
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
