<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Texture Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #1a1a1a;
      color: #fff;
      padding: 20px;
    }
    h1 { margin-bottom: 20px; font-size: 24px; }
    .container {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
    }
    .preview {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .preview h2 {
      font-size: 14px;
      color: #888;
      text-transform: uppercase;
    }
    canvas {
      border: 1px solid #333;
      image-rendering: pixelated;
    }
    #single { width: 256px; height: 256px; }
    #tiled { width: 512px; height: 512px; }
    .info {
      margin-top: 20px;
      padding: 10px;
      background: #222;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
    }
    .controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }
    button {
      background: #333;
      color: #fff;
      border: none;
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover { background: #444; }
  </style>
</head>
<body>
  <h1>Texture Preview: <span id="tex-name">loading...</span></h1>
  <div class="container">
    <div class="preview">
      <h2>1x Preview (256x256)</h2>
      <canvas id="single" width="256" height="256"></canvas>
    </div>
    <div class="preview">
      <h2>2x2 Tiled Preview</h2>
      <canvas id="tiled" width="512" height="512"></canvas>
    </div>
  </div>
  <div class="controls">
    <button onclick="regenerate()">Regenerate (New Seed)</button>
    <button onclick="download()">Download PNG</button>
  </div>
  <div class="info" id="info"></div>
  <script type="module" src="_runner.js"></script>
</body>
</html>
